<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RSVP Data | Ryan & Carly</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet" />
    <style>
      :root { --orange-deep: #b24816; --cream: #fff4e8; --ink: #2f1a10; }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: "Montserrat", Arial, sans-serif; background: linear-gradient(160deg, #e47834 0%, #d35f1d 50%, var(--orange-deep) 100%); color: var(--cream); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
      .card { background: var(--cream); color: var(--ink); border-radius: 18px; padding: 32px; max-width: 480px; text-align: center; box-shadow: 0 12px 28px rgba(48, 12, 0, 0.3); }
      h1 { font-family: "Abril Fatface", Georgia, serif; font-size: 1.8rem; margin: 0 0 12px; }
      p { margin: 0 0 20px; }
      a { display: block; margin: 12px auto; padding: 12px 24px; background: var(--orange-deep); color: var(--cream); text-decoration: none; border-radius: 999px; font-weight: 700; max-width: 220px; }
      a:hover { opacity: 0.95; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>RSVP Responses</h1>
      <p>Download your wedding RSVP data:</p>
      <a href="{{ url_for('download_csv') }}">Download CSV</a>
      <a href="{{ url_for('download_excel') }}">Download Excel</a>
    </div>
  </body>
</html>
