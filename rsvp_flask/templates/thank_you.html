<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thank you | Ryan & Carly Get Hitched</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet" />
    <style>
      :root { --orange-deep: #b24816; --cream: #fff4e8; --ink: #2f1a10; }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: "Montserrat", Arial, sans-serif; background: linear-gradient(160deg, #e47834 0%, #d35f1d 50%, var(--orange-deep) 100%); color: var(--cream); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
      .card { background: var(--cream); color: var(--ink); border-radius: 18px; padding: 32px; max-width: 480px; text-align: center; box-shadow: 0 12px 28px rgba(48, 12, 0, 0.3); }
      h1 { font-family: "Abril Fatface", Georgia, serif; font-size: 1.8rem; margin: 0 0 12px; }
      p { margin: 0 0 20px; }
      a { display: inline-block; padding: 12px 24px; background: var(--orange-deep); color: var(--cream); text-decoration: none; border-radius: 999px; font-weight: 700; }
      a:hover { opacity: 0.95; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Thanks for responding!</h1>
      <p>We're so excited to celebrate with you. See you at Northridge Inn!</p>
      {% if on_site %}<p>We will be in touch asap about room assignments!</p>{% endif %}
      <div style="display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-top: 20px;">
        <a href="{{ site_base_url }}">Back to wedding site</a>
        <a href="{{ site_base_url }}/rsvp.html" style="background: #f4e3d1; color: #2f1a10;">Change my response</a>
      </div>
    </div>
  </body>
</html>
