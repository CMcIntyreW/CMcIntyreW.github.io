<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RSVP | Ryan & Carly Get Hitched</title>
    <meta
      name="description"
      content="RSVP for Ryan and Carly's wedding weekend. Share your attendance details and preferences."
    />
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Montserrat:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --orange: #d35f1d;
        --orange-deep: #b24816;
        --cream: #fff4e8;
        --ink: #2f1a10;
        --white: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Montserrat", Arial, sans-serif;
        background: linear-gradient(160deg, #e47834 0%, var(--orange) 50%, var(--orange-deep) 100%);
        color: var(--cream);
      }

      .container {
        width: min(840px, 92%);
        margin: 0 auto;
        padding: 42px 0 58px;
      }

      .nav-tabs {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 6px 20px;
        padding: 16px 0 8px;
        border-bottom: 1px solid rgba(255, 244, 232, 0.25);
      }
      .nav-tabs a {
        color: var(--cream);
        text-decoration: none;
        font-size: 0.9rem;
        font-weight: 600;
        letter-spacing: 0.04em;
        padding: 6px 12px;
        border-radius: 8px;
        opacity: 0.9;
      }
      .nav-tabs a:hover {
        background: rgba(255, 244, 232, 0.15);
        opacity: 1;
      }
      .nav-tabs a.active {
        background: rgba(255, 244, 232, 0.2);
        opacity: 1;
      }

      h1 {
        margin: 0 0 10px;
        font-family: "Abril Fatface", Georgia, serif;
        font-size: clamp(2rem, 6vw, 3.6rem);
        line-height: 1;
      }

      .lead {
        margin: 0 0 22px;
        font-size: 1rem;
      }

      .card {
        background: var(--cream);
        color: var(--ink);
        border-radius: 18px;
        padding: 22px;
        box-shadow: 0 12px 28px rgba(48, 12, 0, 0.3);
      }

      .field {
        margin-bottom: 14px;
      }

      label {
        display: block;
        font-weight: 700;
        margin-bottom: 6px;
      }

      input,
      select,
      textarea {
        width: 100%;
        border: 1px solid #d6c0ab;
        border-radius: 10px;
        padding: 11px 12px;
        font: inherit;
        background: var(--white);
      }

      textarea {
        min-height: 96px;
        resize: vertical;
      }

      .two-col {
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .check-group {
        display: grid;
        gap: 8px;
        margin-top: 6px;
      }

      .check-item {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .check-item input {
        width: 18px;
        height: 18px;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 18px;
      }

      .btn {
        border: none;
        border-radius: 999px;
        padding: 12px 20px;
        font-weight: 800;
        letter-spacing: 0.03em;
        text-transform: uppercase;
        text-decoration: none;
      }

      .btn.primary {
        background: var(--orange-deep);
        color: var(--cream);
      }

      .btn.secondary {
        background: #f4e3d1;
        color: var(--ink);
      }

      .note {
        margin-top: 14px;
        font-size: 0.9rem;
        opacity: 0.85;
      }

      .form-embed-wrap {
        border-radius: 12px;
        overflow: hidden;
        min-height: 600px;
      }

      .google-form-embed {
        display: block;
        min-height: 1200px;
      }

      @media (min-width: 760px) {
        .two-col {
          grid-template-columns: 1fr 1fr;
        }
      }
    </style>
  </head>
  <body>
    <nav class="nav-tabs container" aria-label="Main">
      <a href="index.html">Home</a>
      <a href="venue.html">The Venue</a>
      <a href="rsvp.html" class="active">RSVP</a>
    </nav>
    <main class="container">
      <h1>RSVP Here!</h1>
      <p class="lead">We can't wait to celebrate with you. Please send your response by July 15, 2026.</p>

      <!-- RSVP form is a Flask app. For local testing use http://localhost:5000; after deploy, change the link to your app URL. -->
      <section class="card">
        <p style="margin-bottom: 1rem;">Click the button below to open the RSVP form.</p>
        <div class="actions">
          <a class="btn primary" href="http://localhost:5000/">Open RSVP form</a>
          <a class="btn secondary" href="index.html">Back to home</a>
        </div>
        <p class="note" style="margin-top: 1rem;">After you deploy the Flask app (see rsvp_flask/README.md), update this link to your app URL.</p>
      </section>
    </main>
  </body>
</html>
