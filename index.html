<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ryan & Carly | Wedding</title>
  <style>
    :root { --bg:#faf7f2; --text:#2f2a26; --accent:#9c7a5b; }
    * { box-sizing:border-box; }
    body { margin:0; font-family: Georgia, serif; background:var(--bg); color:var(--text); }
    .wrap { max-width:800px; margin:0 auto; padding:48px 24px; text-align:center; }
    h1 { font-size:48px; margin:0 0 8px; }
    h2 { font-size:24px; font-weight:normal; margin:0 0 32px; color:var(--accent); }
    .card { background:white; border-radius:16px; padding:24px; margin:16px 0; box-shadow:0 6px 24px rgba(0,0,0,.06); }
    a.btn { display:inline-block; margin-top:12px; padding:12px 18px; border-radius:999px; text-decoration:none; background:var(--accent); color:white; }
    .small { opacity:.75; font-size:14px; margin-top:28px; }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Ryan & Carly</h1>
    <h2>We're getting hitched!</h2>

    <section class="card">
      <p><strong>Date:</strong> Add your date</p>
      <p><strong>Location:</strong> Add your venue</p>
      <p><strong>Time:</strong> Add your time</p>
      <a class="btn" href="#">RSVP</a>
    </section>

    <section class="card">
      <p>More details on schedule, travel, registry, and FAQs coming soon.</p>
    </section>

    <p class="small">Made with love • ryanandcarlygethitched.com</p>
  </main>
</body>
</html>
